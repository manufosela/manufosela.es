<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Mánu Fosela</title>
  <link rel="preload" href="/fonts/manrope-variable.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/inter-subset.woff2" as="font" type="font/woff2" crossorigin />
  <style>
    @font-face {
      font-family: 'Manrope';
      font-display: swap;
      font-style: normal;
      font-weight: 200 900;
      src: url('/fonts/manrope-variable.woff2') format('woff2-variations');
    }
    @font-face {
      font-family: 'Inter';
      font-display: swap;
      font-style: normal;
      src: url('/fonts/inter-subset.woff2') format('woff2');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #131313;
      color: #e5e2e1;
      font-family: 'Inter', sans-serif;
      padding: 2rem;
      text-align: center;
    }

    .error-code {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #1c1b1b;
      position: relative;
    }
    .error-code::after {
      content: '404';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #00e0b3, #00ffcc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.15;
    }

    h1 {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 800;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.9375rem;
      line-height: 1.6;
      color: #b9cbc2;
      max-width: 28rem;
      margin-bottom: 2.5rem;
    }

    a {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #e5e2e1;
      text-decoration: none;
      padding-bottom: 0.375rem;
      position: relative;
    }
    a span {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 2rem;
      height: 1px;
      background-color: #00e0b3;
      transition: width 320ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    a:hover { color: #00e0b3; }
    a:hover span { width: 100%; }
  </style>
</head>
<body>
  <div class="error-code">404</div>
  <h1>Esta página no existe</h1>
  <p>Puede que la URL haya cambiado o que la página haya sido eliminada. Vuelve al inicio para seguir explorando.</p>
  <a href="/es/">
    Volver al inicio
    <span aria-hidden="true"></span>
  </a>
</body>
</html>
